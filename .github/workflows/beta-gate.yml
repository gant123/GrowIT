name: beta-gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: GrowIT
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d GrowIT"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=127.0.0.1;Port=5432;Database=GrowIT;Username=postgres;Password=postgres;SSL Mode=Disable
      Jwt__Key: integration-test-signing-key-please-change-in-real-env
      Reports__Scheduler__Enabled: "false"
      ClientUrl: http://127.0.0.1:5245

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore .NET dependencies
        run: dotnet restore GrowIT.slnx

      - name: Build
        run: dotnet build GrowIT.slnx -c Release --no-restore -m:1 --disable-build-servers

      - name: Run integration tests
        run: dotnet test tests/GrowIT.IntegrationTests/GrowIT.IntegrationTests.csproj -c Release --no-build --logger trx --results-directory tests/GrowIT.IntegrationTests/TestResults

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef --version 10.0.*

      - name: Add dotnet tools to PATH
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Apply database migrations
        run: |
          dotnet ef database update \
            --project src/GrowIT.Infrastructure/GrowIT.Infrastructure.csproj \
            --startup-project src/GrowIT.Client/GrowIT.Client.csproj \
            --context ApplicationDbContext \
            --connection "Host=127.0.0.1;Port=5432;Database=GrowIT;Username=postgres;Password=postgres;SSL Mode=Disable"

      - name: Install Playwright test dependencies
        working-directory: tests/Playwright
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browser
        working-directory: tests/Playwright
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        working-directory: tests/Playwright
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            tests/Playwright/playwright-report
            tests/Playwright/test-results
            tests/GrowIT.IntegrationTests/TestResults
