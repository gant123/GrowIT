services:
  db:
    image: postgres:16-alpine
    container_name: growit-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-GrowIT}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-GrowIT}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - growit-postgres-data:/var/lib/postgresql/data

  client:
    build:
      context: .
      dockerfile: docker/client/Dockerfile
    container_name: growit-client
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB:-GrowIT};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      # Default on so a fresh deploy applies EF migrations and bootstraps roles/SuperAdmin on
      # first boot. Set DATABASE_AUTOMIGRATE=false where migrations are applied out-of-band.
      Database__AutoMigrate: ${DATABASE_AUTOMIGRATE:-true}
      # No placeholder default: refuse to start unless a real secret is supplied. The app also
      # rejects placeholder/short keys at boot in Production (ValidateJwtSigningKey).
      Jwt__Key: ${JWT_KEY:?JWT_KEY must be set to a long random secret (>= 32 chars)}
      SuperAdmin__Email: ${SUPER_ADMIN_EMAIL:-}
      SyncfusionLicense: ${SYNCFUSION_LICENSE:-}
      ClientUrl: ${CLIENT_URL:-https://beta.growit.now}
      InternalApiBaseUrl: ${INTERNAL_API_BASE_URL:-http://localhost:8080}
      Stripe__SecretKey: ${STRIPE_SECRET_KEY:-}
      Stripe__WebhookSecret: ${STRIPE_WEBHOOK_SECRET:-}
      Stripe__Plans__Pro__MonthlyPriceId: ${STRIPE_PRO_MONTHLY_PRICE_ID:-}
      Stripe__Plans__Pro__YearlyPriceId: ${STRIPE_PRO_YEARLY_PRICE_ID:-}
      Stripe__Plans__Enterprise__MonthlyPriceId: ${STRIPE_ENTERPRISE_MONTHLY_PRICE_ID:-}
      Stripe__Plans__Enterprise__YearlyPriceId: ${STRIPE_ENTERPRISE_YEARLY_PRICE_ID:-}
      Cors__AllowedOrigins__0: ${CLIENT_URL:-https://beta.growit.now}
      Cors__AllowedOrigins__1: http://localhost:${CLIENT_PORT:-5180}
      Email__ResendApiKey: ${EMAIL_RESEND_API_KEY:-}
      Email__ResendBaseUrl: ${EMAIL_RESEND_BASE_URL:-https://api.resend.com}
      Email__FromEmail: ${EMAIL_FROM_EMAIL:-noreply@growit.local}
      Email__FromName: ${EMAIL_FROM_NAME:-grow.IT}
      Email__TimeoutMs: ${EMAIL_TIMEOUT_MS:-10000}
      Email__DevFileFallbackEnabled: ${EMAIL_DEV_FILE_FALLBACK_ENABLED:-false}
      Email__DevFileFallbackDirectory: /app/dev-emails
      Reports__Scheduler__Enabled: ${REPORT_SCHEDULER_ENABLED:-true}
      Reports__Scheduler__PollSeconds: ${REPORT_SCHEDULER_POLL_SECONDS:-60}
      Reports__Scheduler__MaxSchedulesPerCycle: ${REPORT_SCHEDULER_MAX_PER_CYCLE:-20}
      Reports__Scheduler__DefaultReportType: ${REPORT_SCHEDULER_DEFAULT_TYPE:-impact-summary}
      Reports__Scheduler__DefaultFormat: ${REPORT_SCHEDULER_DEFAULT_FORMAT:-pdf}
    ports:
      - "${CLIENT_PORT:-5180}:8080"
    volumes:
      - growit-web-uploads:/app/wwwroot/uploads
      - growit-web-dev-emails:/app/dev-emails

volumes:
  growit-postgres-data:
  growit-web-uploads:
  growit-web-dev-emails:
